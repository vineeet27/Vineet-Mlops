version: '3.8'

services:
  iris-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iris-inference-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    volumes:
      - ./main.py:/app/main.py:ro
    labels:
      description: "Iris Flower Classification API"
